<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0f0f;
      --ink-soft: #6b6b6b;
      --ink-ghost: #b0b0b0;
      --page: #f5f4f0;
      --card: #ffffff;
      --accent: #5b4fff;
      --accent-dim: #ece9ff;
      --accent-text: #3a2fcc;
      --done-line: #c8c5e8;
      --danger: #e53935;
      --border: #e5e3dc;
      --border-strong: #c9c7be;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--page);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 48px 16px 80px;
    }

    .shell {
      width: 100%;
      max-width: 480px;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 32px;
    }

    .wordmark {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      color: var(--ink);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .wordmark span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--ink-ghost);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .progress-label {
      font-size: 0.78rem;
      color: var(--ink-soft);
      font-weight: 500;
      min-width: 56px;
      text-align: right;
    }

    /* ── Add form ── */
    .add-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 6px 6px 6px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .add-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 79, 255, 0.12);
    }

    .add-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: transparent;
    }

    .add-wrap input::placeholder { color: var(--ink-ghost); }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      width: 36px;
      height: 36px;
      font-size: 1.4rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      line-height: 1;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .add-btn:hover { background: #4a3fe0; }
    .add-btn:active { transform: scale(0.94); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--done-line);
      color: var(--accent-text);
    }

    .filter-btn:not(.active):hover {
      border-color: var(--border-strong);
      color: var(--ink);
    }

    /* ── Todo list ── */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 14px 14px 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover {
      border-color: var(--border-strong);
    }

    .todo-item.done {
      background: #fafaf8;
    }

    /* custom checkbox */
    .cb-wrap {
      position: relative;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .cb-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
      z-index: 1;
    }

    .cb-visual {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border-strong);
      background: var(--card);
      display: grid;
      place-items: center;
      transition: all 0.15s;
      pointer-events: none;
    }

    .cb-wrap input:checked ~ .cb-visual {
      background: var(--accent);
      border-color: var(--accent);
    }

    .cb-visual::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(43deg) translate(-1px, -1px);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .cb-wrap input:checked ~ .cb-visual::after {
      opacity: 1;
    }

    .todo-title {
      flex: 1;
      font-size: 0.92rem;
      color: var(--ink);
      line-height: 1.45;
      word-break: break-word;
    }

    .todo-item.done .todo-title {
      color: var(--ink-ghost);
      text-decoration: line-through;
      text-decoration-color: var(--done-line);
    }

    .todo-date {
      font-size: 0.72rem;
      color: var(--ink-ghost);
      white-space: nowrap;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--ink-ghost);
      cursor: pointer;
      font-size: 1rem;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: #fdecea;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--ink-ghost);
    }

    .empty-icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 0.88rem;
    }

    /* ── Error toast ── */
    .error-toast {
      display: none;
      background: #fdecea;
      color: var(--danger);
      border: 1px solid #f5c6c6;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.85rem;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      color: var(--ink-ghost);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--danger); }

    .stack-label {
      font-size: 0.72rem;
      color: var(--ink-ghost);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="shell">

    <header class="header">
      <div class="wordmark">task<span>ly</span></div>
      <div class="tagline">Simple tasks. Fast workflow.</div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">0 / 0</div>
      </div>
    </header>

    <div class="error-toast" id="error-toast"></div>

    <div class="add-wrap">
      <input type="text" id="new-todo" placeholder="Add a new task…" maxlength="200" autocomplete="off" />
      <button class="add-btn" id="add-btn" title="Add task">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="footer">
      <button class="clear-btn" id="clear-btn">Clear completed</button>
    </div>

  </div>

  <script>
    const API = '/api';
    let todos = [];
    let filter = 'all';

    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        if (!res.ok) throw new Error();
        todos = await res.json();
        render();
      } catch {
        showError('Could not reach the backend. Make sure the API container is running.');
      }
    }

    async function addTodo(title) {
      try {
        const res = await fetch(`${API}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        if (!res.ok) throw new Error();
        todos.unshift(await res.json());
        render();
      } catch {
        showError('Failed to add task.');
      }
    }

    async function toggleTodo(id, done) {
      try {
        const res = await fetch(`${API}/todos/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: done ? 1 : 0 })
        });
        if (!res.ok) throw new Error();
        const updated = await res.json();
        todos = todos.map(t => t.id === id ? updated : t);
        render();
      } catch {
        showError('Failed to update task.');
      }
    }

    async function deleteTodo(id) {
      try {
        await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
        todos = todos.filter(t => t.id !== id);
        render();
      } catch {
        showError('Failed to delete task.');
      }
    }

    async function clearCompleted() {
      const done = todos.filter(t => t.done);
      await Promise.all(done.map(t => fetch(`${API}/todos/${t.id}`, { method: 'DELETE' })));
      todos = todos.filter(t => !t.done);
      render();
    }

    function timeAgo(dateStr) {
      const diff = (Date.now() - new Date(dateStr + 'Z')) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const doneCount = todos.filter(t => t.done).length;
      const total = todos.length;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `${doneCount} / ${total}`;

      if (filtered.length === 0) {
        const msgs = {
          all: ['☁️', 'No tasks yet', 'Add something above to get started.'],
          active: ['✅', 'All caught up!', 'Nothing left to do.'],
          done: ['🗂️', 'Nothing completed yet', 'Check off a task to see it here.']
        };
        const [icon, head, sub] = msgs[filter];
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${icon}</div>
            <strong style="display:block;font-size:.9rem;color:#6b6b6b;margin-bottom:4px">${head}</strong>
            <p>${sub}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(t => `
        <li class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <label class="cb-wrap" aria-label="${t.done ? 'Mark incomplete' : 'Mark complete'}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id}, this.checked)" />
            <div class="cb-visual"></div>
          </label>
          <span class="todo-title">${escHtml(t.title)}</span>
          <span class="todo-date">${timeAgo(t.created_at)}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Delete task">✕</button>
        </li>
      `).join('');
    }

    function showError(msg) {
      const el = document.getElementById('error-toast');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      const input = document.getElementById('new-todo');
      const title = input.value.trim();
      if (title) { addTodo(title); input.value = ''; }
    });

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const title = e.target.value.trim();
        if (title) { addTodo(title); e.target.value = ''; }
      }
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clear-btn').addEventListener('click', clearCompleted);

    fetchTodos();
  </script>
</body>
</html>
