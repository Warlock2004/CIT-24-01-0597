<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      color: #2d3748;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #718096;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input:focus { border-color: #667eea; }

    .add-form button {
      padding: 10px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .add-form button:hover { background: #5a67d8; }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .filters button {
      padding: 5px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: transparent;
      font-size: 0.85rem;
      cursor: pointer;
      color: #718096;
      transition: all 0.15s;
    }

    .filters button.active {
      border-color: #667eea;
      color: #667eea;
      font-weight: 600;
    }

    #todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f4f8;
      transition: background 0.15s;
      border-radius: 6px;
    }

    .todo-item:hover { background: #f7fafc; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-title {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty-state {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .stats {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #a0aec0;
      text-align: right;
    }

    .error-toast {
      display: none;
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>
    <p class="subtitle">Powered by Flask + Nginx + Docker</p>

    <div class="error-toast" id="error-toast"></div>

    <form class="add-form" id="add-form">
      <input type="text" id="new-todo" placeholder="What needs to be done?" maxlength="200" />
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="active">Active</button>
      <button data-filter="done">Done</button>
    </div>

    <ul id="todo-list"></ul>
    <div class="stats" id="stats"></div>
  </div>

  <script>
    const API = '/api';
    let todos = [];
    let filter = 'all';

    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        todos = await res.json();
        render();
      } catch (e) {
        showError('Could not connect to the backend. Is the API service running?');
      }
    }

    async function addTodo(title) {
      const res = await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      if (!res.ok) { showError('Failed to add todo.'); return; }
      todos.unshift(await res.json());
      render();
    }

    async function toggleTodo(id, done) {
      const res = await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done: done ? 1 : 0 })
      });
      if (!res.ok) return;
      const updated = await res.json();
      todos = todos.map(t => t.id === id ? updated : t);
      render();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">No todos here yet ✨</div>`;
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id}, this.checked)" />
            <span class="todo-title">${escHtml(t.title)}</span>
            <button class="delete-btn" onclick="deleteTodo(${t.id})" title="Delete">✕</button>
          </li>
        `).join('');
      }

      const done = todos.filter(t => t.done).length;
      document.getElementById('stats').textContent =
        todos.length ? `${done} / ${todos.length} completed` : '';
    }

    function showError(msg) {
      const el = document.getElementById('error-toast');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('add-form').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('new-todo');
      const title = input.value.trim();
      if (title) { addTodo(title); input.value = ''; }
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    fetchTodos();
  </script>
</body>
</html>
